<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reflect - Push Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 48px 16px; }
  .card { width: 100%; max-width: 520px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 32px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 24px; color: #fff; }
  .env-row { display: flex; gap: 8px; margin-bottom: 24px; }
  .env-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #333; background: #111; color: #888; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.15s; }
  .env-btn.active { background: #fff; color: #000; border-color: #fff; }
  .env-btn.active.danger { background: #ff4444; color: #fff; border-color: #ff4444; }
  label { display: block; margin-bottom: 16px; }
  label span { display: block; font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  input, textarea { width: 100%; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; color: #e8e8e8; font-size: 14px; padding: 10px 12px; outline: none; font-family: inherit; resize: vertical; }
  input:focus, textarea:focus { border-color: #555; }
  .send-btn { width: 100%; padding: 12px; border-radius: 8px; background: #e8e8e8; color: #000; border: none; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.15s; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #result { margin-top: 20px; padding: 12px 14px; border-radius: 8px; font-size: 14px; display: none; }
  #result.success { background: #0d2a0d; border: 1px solid #1a4a1a; color: #4caf50; }
  #result.error { background: #2a0d0d; border: 1px solid #4a1a1a; color: #f44336; }
  .user-id-row { display: flex; gap: 8px; align-items: flex-end; }
  .user-id-row input { flex: 1; }
  .list-btn { padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #111; color: #888; cursor: pointer; font-size: 13px; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
  .list-btn:hover { border-color: #555; color: #ccc; }
  .user-table { margin-top: 10px; border: 1px solid #2a2a2a; border-radius: 8px; overflow: hidden; display: none; max-height: 220px; overflow-y: auto; }
  .user-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; padding: 9px 12px; border-bottom: 1px solid #222; cursor: pointer; transition: background 0.1s; }
  .user-row:last-child { border-bottom: none; }
  .user-row:hover { background: #222; }
  .user-row.selected { background: #1e2e1e; }
  .user-email { font-size: 13px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .user-token { font-size: 10px; color: #555; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
  .user-table-empty { padding: 16px 12px; font-size: 13px; color: #555; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <h1>Reflect &mdash; Push Notifications</h1>
  <div class="env-row">
    <button class="env-btn active" id="btn-stg" onclick="setEnv('stg')">Staging</button>
    <button class="env-btn danger" id="btn-prd" onclick="setEnv('prd')">Production</button>
  </div>
  <form id="form">
    <label>
      <span>Admin Secret</span>
      <input type="password" id="secret" autocomplete="current-password" />
    </label>
    <label>
      <span>Title</span>
      <input type="text" id="title" value="Reflect" />
    </label>
    <label>
      <span>Message</span>
      <textarea id="body" rows="3" placeholder="Type your notification message..."></textarea>
    </label>
    <label>
      <span>User <em style="text-transform:none;font-style:normal;color:#555">(optional &mdash; leave blank to send to all devices)</em></span>
      <div class="user-id-row">
        <input type="text" id="user_id" placeholder="Select from list or paste user ID" />
        <button type="button" class="list-btn" id="list-btn" onclick="loadUsers()">Load users</button>
      </div>
      <div class="user-table" id="user-table"></div>
    </label>
    <button type="submit" class="send-btn" id="send-btn">Send Push</button>
  </form>
  <div id="result"></div>
</div>
<script>
  const URLS = {
    stg: 'https://sznlkorcninofgezkwmy.supabase.co/functions/v1/admin-push',
    prd: 'https://orrcfftpaxlldolavipm.supabase.co/functions/v1/admin-push',
  }
  let env = 'stg'
  let users = []

  const secretEl = document.getElementById('secret')
  secretEl.value = localStorage.getItem('reflect_admin_secret') || ''

  function setEnv(e) {
    env = e
    document.getElementById('btn-stg').classList.toggle('active', e === 'stg')
    document.getElementById('btn-prd').classList.toggle('active', e === 'prd')
    document.getElementById('btn-stg').classList.remove('danger')
    document.getElementById('btn-prd').classList.remove('danger')
    if (e === 'prd') document.getElementById('btn-prd').classList.add('active', 'danger')
    if (e === 'stg') document.getElementById('btn-stg').classList.add('active')
    // reset list when switching env
    users = []
    document.getElementById('user-table').style.display = 'none'
    document.getElementById('list-btn').textContent = 'Load users'
  }

  async function loadUsers() {
    const secret = secretEl.value.trim()
    if (!secret) { showResult(false, 'Enter admin secret first.'); return }
    localStorage.setItem('reflect_admin_secret', secret)

    const btn = document.getElementById('list-btn')
    btn.textContent = 'Loading...'
    btn.disabled = true

    try {
      const res = await fetch(URLS[env], {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': secret },
        body: JSON.stringify({ action: 'list' }),
      })
      if (!res.ok) { showResult(false, await res.text()); return }
      users = await res.json()
      renderUsers()
      btn.textContent = 'Refresh'
    } catch (err) {
      showResult(false, err.message)
    } finally {
      btn.disabled = false
    }
  }

  function renderUsers() {
    const table = document.getElementById('user-table')
    if (!users.length) {
      table.innerHTML = '<div class="user-table-empty">No devices registered</div>'
      table.style.display = 'block'
      return
    }
    const selectedId = document.getElementById('user_id').value.trim()
    table.innerHTML = users.map(u => `
      <div class="user-row${u.user_id === selectedId ? ' selected' : ''}" onclick="selectUser('${u.user_id}')">
        <div>
          <div class="user-email">${u.email}</div>
          <div class="user-token">token: ${u.fcm_token.split(':')[0]}&hellip;</div>
        </div>
        <div class="user-token" style="max-width:90px;text-align:right">${timeAgo(u.updated_at)}</div>
      </div>
    `).join('')
    table.style.display = 'block'
  }

  function selectUser(userId) {
    document.getElementById('user_id').value = userId
    renderUsers()
  }

  function timeAgo(iso) {
    const diff = Date.now() - new Date(iso).getTime()
    const m = Math.floor(diff / 60000)
    if (m < 1) return 'just now'
    if (m < 60) return m + 'm ago'
    const h = Math.floor(m / 60)
    if (h < 24) return h + 'h ago'
    return Math.floor(h / 24) + 'd ago'
  }

  document.getElementById('form').addEventListener('submit', async (ev) => {
    ev.preventDefault()
    const secret = secretEl.value.trim()
    if (!secret) { showResult(false, 'Admin secret is required.'); return }
    localStorage.setItem('reflect_admin_secret', secret)

    const title = document.getElementById('title').value.trim()
    const body = document.getElementById('body').value.trim()
    if (!title || !body) { showResult(false, 'Title and message are required.'); return }

    const user_id = document.getElementById('user_id').value.trim() || undefined

    const btn = document.getElementById('send-btn')
    btn.disabled = true
    btn.textContent = 'Sending...'

    try {
      const res = await fetch(URLS[env], {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': secret },
        body: JSON.stringify({ title, body, user_id }),
      })
      const text = await res.text()
      showResult(res.ok, text)
    } catch (err) {
      showResult(false, err.message)
    } finally {
      btn.disabled = false
      btn.textContent = 'Send Push'
    }
  })

  let successTimer = null
  function showResult(ok, msg) {
    const el = document.getElementById('result')
    el.textContent = (ok ? '✓ ' : '✗ ') + msg
    el.className = ok ? 'success' : 'error'
    el.style.display = 'block'
    clearTimeout(successTimer)
    if (ok) successTimer = setTimeout(() => { el.style.display = 'none' }, 4000)
  }
</script>
</body>
</html>
